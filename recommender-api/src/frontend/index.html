<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Recommended Items</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            padding: 10px;
            background: #e0e0e0;
            margin: 5px 0;
            border-radius: 5px;
        }
    </style>
    <script>
        async function loadRecommendations() {
            try {
                const response = await fetch("http://127.0.0.1:8000/recommendations/");
                const products = await response.json();

                const recommendationsList = document.getElementById("recommendations");
                recommendationsList.innerHTML = "";

                if (products.length === 0) {
                    recommendationsList.innerHTML = "<li>No recommendations available.</li>";
                } else {
                    products.forEach(product => {
                        const listItem = document.createElement("li");
                        listItem.innerHTML = `<strong>${product.name}</strong> - $${product.price} <br> <span>Total Purchases: ${product.total_purchases}</span>`;
                        recommendationsList.appendChild(listItem);
                    });
                }
            } catch (error) {
                console.error("Error fetching recommendations:", error);
                document.getElementById("recommendations").innerHTML = "<li>Failed to load recommendations.</li>";
            }
        }
        window.onload = loadRecommendations;
    </script>
</head>
<body>
    <div class="container">
        <h1>Top Recommended Items</h1>
        <ul id="recommendations"></ul>
    </div>
</body>
</html>
